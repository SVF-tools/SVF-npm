name: svf-publish

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: "https://registry.npmjs.org/"

      - name: Update npm
        run: npm install -g npm@11

      - name: publish-svf-lib
        run: |
          node --version
          npm --version
          cat package.json
          npm publish --access public

      - name: Verify published package
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Checking svf-lib@$VERSION on npm..."

          for i in {1..10}; do
            if npm view svf-lib@$VERSION version; then
              break
            fi
            echo "Package not visible yet, retrying in 10s..."
            sleep 10
          done

          npm pack svf-lib@$VERSION

          echo "Listing published tarball contents..."
          tar -tzf svf-lib-$VERSION.tgz | tee published-files.txt

          echo "Checking Linux x64 binary..."
          grep -E 'SVF-linux-x86_64|linux.*x64|linux.*x86_64' published-files.txt

          echo "Checking Linux ARM binary..."
          grep -E 'SVF-linux-arm64|SVF-linux-aarch64|linux.*arm64|linux.*aarch64' published-files.txt

          echo "Checking macOS binary..."
          grep -E 'SVF-darwin|SVF-macos|SVF-osx|darwin|macos' published-files.txt
          
  trigger-svf-python:
    if: github.event_name == 'push'  # Only run on push events
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v2

      - name: Check for changes in SVF-linux-x86_64
        id: changes
        run: |
          git fetch origin master --depth=3
          CHANGED=$(git diff --name-only HEAD~2 HEAD~1 | grep '^SVF-linux-x86_64' || true)
          echo "Changed files: $CHANGED"
          if [ -z "$CHANGED" ]; then
            echo "should_trigger=false" >> $GITHUB_OUTPUT
          else
            echo "should_trigger=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger SVF-Python workflow if needed
        if: steps.changes.outputs.should_trigger == 'true'
        run: |
          git clone https://github.com/SVF-tools/SVF-Python.git
          cd SVF-Python
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "trigger: changes in SVF-linux-x86_64"
          git push https://yuleisui:${{secrets.yulei_git_key}}@github.com/SVF-tools/SVF-Python.git HEAD:main
